<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 300px; padding: 0; margin: 0; background: #0f0f0f; color: #e0e0e0; font-family: sans-serif; }
        .header { background: linear-gradient(90deg, #FF9933, #FFFFFF, #138808); padding: 10px; color: #000; font-weight: bold; text-align: center; border-bottom: 2px solid #00d4ff; }
        .container { padding: 15px; }
        button { width: 100%; padding: 10px; background: #00d4ff; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; }
        #result { margin-top: 15px; font-size: 13px; line-height: 1.4; white-space: pre-wrap; }
        .loader { color: #FF9933; font-style: italic; display: none; }
    </style>
</head>
<body>
    <div class="header">PolicyShield</div>
    <div class="container">
        <button id="scanBtn">SCAN POLICY</button>
        <div id="loader" class="loader">Analyzing with Gemini AI...</div>
        <div id="result"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
